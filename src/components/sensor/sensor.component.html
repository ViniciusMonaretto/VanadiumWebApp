<div class="sensor-card">

  <!-- Three dots -->
  <div class="menu-wrapper">
    <button class="menu-button" (click)="toggleMenu()">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </button>

    <div *ngIf="menuOpen" class="menu-dropdown">
      <button class="menu-item settings" (click)="openSettingsDialog()">
        Configurações
      </button>
      <button class="menu-item plot" (click)="plotSensor()">
        Gráfico
      </button>
      <button class="menu-item delete" (click)="deletePanel()">
        Remover
      </button>
    </div>
  </div>

  <!-- Title -->
  <h2 class="sensor-name">{{ sensorInfo.name }}</h2>

  <!-- Status -->
  <div class="status-container">
    <span class="status-pill" [ngClass]="getStatusColor()">
      <span class="status-dot"></span>
      {{ getStatusMessageOfSensor() }}
    </span>
  </div>

  <!-- Value -->
  <div class="sensor-body">
    <div class="sensor-value">
      {{ getCurrentReading() }}<span class="unit">{{ getMeasureIcon() }}</span>
    </div>

    <div class="sensor-label">
      {{ sensorInfo.gatewayId }}
    </div>

    <div class="sensor-updated">
      {{ getLastActivityLabel() }}
    </div>
  </div>

</div>

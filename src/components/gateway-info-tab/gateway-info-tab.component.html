<div class="device-card">
  
  <!-- Header -->
  <div class="device-header">
    <h2 class="device-name">{{ gateway.name }}</h2>

    <div class="device-header-right">
      <span
        class="status-pill"
        [ngClass]="getStatusColor(gateway.status)"
      >
        <span class="status-dot"></span>
        {{ gateway.status }}
      </span>

      <!-- Three dots menu -->
      <div class="menu-wrapper">
        <button
          class="menu-button"
          (click)="toggleMenu()"
        >
          ⋮
        </button>

        <div
          *ngIf="menuOpen"
          class="menu-dropdown"
        >
          <button
            class="menu-item delete"
            (click)="handleDelete()"
          >
            Delete
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Content -->
  <div class="device-content">

    <div class="device-image-container">
      <img
        [src]="getImageUrl(gateway.image)"
        [alt]="gateway.name + ' dashboard'"
        class="device-image"
      />
    </div>

    <div class="device-info">

      <div class="info-item">
        <span class="info-label">IP Address:</span>
        <span class="info-value">{{ gateway.ip }}</span>
      </div>

      <div class="info-item">
        <span class="info-label">Uptime:</span>
        <span class="info-value">{{ formatUptime(gateway.uptime) }}</span>
      </div>

      <div class="info-item">
        <span class="info-label">Last Activity:</span>
        <span class="info-value">{{ gateway.lastActivity }}</span>
      </div>

    </div>

  </div>
</div>

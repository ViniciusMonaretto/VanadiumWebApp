<div class="chart-container">
    <!-- Header -->
    <div class="chart-header">
        <div class="chart-title-area">
            <h2 class="chart-title">Gráfico Avançado</h2>
            <span class="source-count">{{ dataSources.length }} source{{ dataSources.length !== 1 ? 's' : '' }}</span>
        </div>

        <!-- Toolbar -->
        <div class="chart-toolbar">
            <div class="toolbar-group">
                <button class="tool-btn" [class.active]="activeTool === 'zoom'" (click)="setTool('zoom')"
                    title="Zoom Mode">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35M11 8v6M8 11h6" />
                    </svg>
                    <span>Zoom</span>
                </button>
                <button class="tool-btn" [class.active]="activeTool === 'pan'" (click)="setTool('pan')"
                    title="Pan Mode">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20" />
                    </svg>
                    <span>Pan</span>
                </button>
                <button class="tool-btn" [class.active]="crosshairRefMode" (click)="toggleCrosshairRefMode()"
                    title="Add Crosshair Reference Lines">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <line x1="12" y1="5" x2="12" y2="19" />
                    </svg>
                    <span>Cross-Ref</span>
                </button>
                <button class="tool-btn" [class.active]="referenceLinesModeVertical"
                    (click)="toggleReferenceLinesModeVertical()" title="Add Vertical Reference Lines">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                    </svg>
                    <span>V-Ref</span>
                </button>
                <button class="tool-btn" [class.active]="referenceLinesModeHorizontal"
                    (click)="toggleReferenceLinesModeHorizontal()" title="Add Horizontal Reference Lines">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span>H-Ref</span>
                </button>
            </div>

            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <button class="tool-btn" title="Zoom In">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35M11 8v6M8 11h6" />
                    </svg>
                    <span>+</span>
                </button>
                <button class="tool-btn" title="Zoom Out">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35M8 11h6" />
                    </svg>
                    <span>−</span>
                </button>
                <button class="tool-btn" (click)="resetZoom()" title="Reset View">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                    <span>Reset</span>
                </button>
            </div>

            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <button class="tool-btn danger" (click)="clearGraphLines()" title="Clear Reference Lines"
                    [disabled]="!hasGraphLines()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6l-1 14H6L5 6" />
                        <path d="M10 11v6M14 11v6M9 6V4h6v2" />
                    </svg>
                    <span>Clear</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Chart canvas -->
    <div class="canvas-wrapper" [class.marker-mode]="false"
        [class.reference-mode]="crosshairRefMode || referenceLinesModeVertical || referenceLinesModeHorizontal">
        <graph style="height: 100%;" 
            [inputInfo]="$any(dataSources)" 
            [drawingMode]="getDrawingMode()"
            [selectedDataLineIndex]="-1"
            [zoomEnabled]="activeTool == 'zoom'"
            [clearLines]="clearRefLinesTrigger"
            [resize]="resizeTrigger">
    </graph>
    </div>

    <!-- Legend / Sources -->
    <div class="chart-legend">
        <div class="legend-item" *ngFor="let source of dataSources; let i = index">
            <span class="legend-color"
                [style.background]="source.color || defaultColors[i % defaultColors.length]"></span>
            <span class="legend-label">{{ source.label }}</span>
        </div>
    </div>
</div>

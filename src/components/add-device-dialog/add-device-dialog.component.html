<div class="modal-overlay" (click)="close()">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h2 class="modal-title">Adicionar Novo Dispositivo</h2>
      <button class="close-button" (click)="close()">✕</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="device-id">ID do Dispositivo</label>
        <input 
          id="device-id"
          type="text" 
          [(ngModel)]="deviceId" 
          placeholder="ex: Device-1001"
          class="form-input"
          (keyup.enter)="submit()">
        <small class="input-hint">O IP e Uptime serão preenchidos após o handshake</small>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="close()">Cancelar</button>
      <button class="btn-submit" (click)="submit()">Adicionar Dispositivo</button>
    </div>

  </div>
</div>
